version: '3.8'

services:
  jumperless-emulator:
    build:
      context: .
      dockerfile: Dockerfile.emulator
    container_name: jumperless-emulator
    command: [
      "-port", "/tmp/jumperless",
      "-verbose"
    ]
    volumes:
      - ./examples:/config:ro
      - jumperless-volume:/tmp
    networks:
      - jumperless-net
    restart: unless-stopped

  jumperless-proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: jumperless-proxy
    command: [
      "-virtual-port", "/tmp/jumperless-proxy",
      "-real-port", "/dev/ttyUSB0",
      "-recording-file", "/recordings/session.yaml",
      "-verbose"
    ]
    volumes:
      - ./examples:/config:ro
      - ./recordings:/recordings
      - /dev:/dev
    networks:
      - jumperless-net
    privileged: true  # Needed for serial port access
    restart: unless-stopped
    depends_on:
      - jumperless-emulator

volumes:
  jumperless-volume:

networks:
  jumperless-net:
    driver: bridge